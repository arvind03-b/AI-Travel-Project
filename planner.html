<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripPlanner Engine - Real-Time Dynamic Experience</title>
    <meta name="description" content="A premium dynamic trip planner engine that updates in real-time based on your preferences.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Background Elements -->
        <div class="ambient-background">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
        </div>

        <nav class="glass-nav">
            <div class="nav-logo"><a href="index.html" style="color:inherit;text-decoration:none;">TripEngine<span class="dot">.</span></a></div>
            <div class="nav-links">
                <a href="index.html">Discover</a>
                <a href="planner.html" class="active">Planner</a>
                <a href="experiences.html">Experiences</a>
            </div>
            <div class="nav-user">
                <a href="profile.html"><div class="avatar"></div></a>
            </div>
        </nav>

        <main class="main-content">
            <header class="hero-section">
                <h1 class="hero-title">Craft Your <br><span class="gradient-text">Perfect Journey</span></h1>
                <p class="hero-subtitle">Real-time dynamic itinerary generation based on your evolving preferences.</p>
            </header>

            <section class="planner-interface">
                <!-- Preferences Panel -->
                <aside class="preferences-panel glass-panel">
                    <h2>Your Preferences</h2>
                    <p class="panel-desc">Update parameters to see real-time changes.</p>
                    
                    <div class="pref-group">
                        <label for="destination">Destination Vibe</label>
                        <select id="destination" class="glass-input">
                            <option value="any">Surprise Me</option>
                            <option value="tropical">Tropical Beach</option>
                            <option value="urban">Urban City</option>
                            <option value="mountain">Mountain Retreat</option>
                            <option value="historical">Historical & Cultural</option>
                        </select>
                    </div>

                    <div class="pref-group">
                        <label>Budget Level (<span id="budgetValue">Moderate</span>)</label>
                        <input type="range" id="budgetRange" min="1" max="3" value="2" class="glass-slider">
                        <div class="slider-labels">
                            <span>Budget</span>
                            <span>Luxury</span>
                        </div>
                    </div>

                    <div class="pref-group">
                        <label>Interests</label>
                        <div class="tags-container" id="interestsTags">
                            <button class="tag active" data-value="food">Gastronomy</button>
                            <button class="tag" data-value="art">Art & Museums</button>
                            <button class="tag" data-value="nature">Nature & Hiking</button>
                            <button class="tag" data-value="nightlife">Nightlife</button>
                            <button class="tag active" data-value="relaxation">Relaxation</button>
                        </div>
                    </div>

                    <button class="btn-primary" id="generateBtn">Update Itinerary</button>
                </aside>

                <!-- Results & Itinerary -->
                <section class="results-panel">
                    <div class="status-bar glass-panel">
                        <div class="status-indicator">
                            <span class="pulse"></span> Live Sync Active
                        </div>
                        <div class="security-badge">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            Secure Session
                        </div>
                    </div>

                    <div class="suggestions-grid" id="suggestionsGrid">
                        <!-- Dynamic content injected here -->
                    </div>

                    <div class="itinerary-timeline glass-panel" id="itineraryTimeline">
                        <h3>Generated Itinerary</h3>
                        <div class="timeline-container" id="timelineList">
                            <!-- Dynamic timeline injected here -->
                        </div>
                    </div>
                </section>
            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
